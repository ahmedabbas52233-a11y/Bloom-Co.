name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile
        run: javac -d out -sourcepath src src/com/bloomshop/Main.java

      - name: Package JAR
        run: jar --create --file BloomShop.jar --main-class com.bloomshop.Main -C out .

      - name: Smoke test
        run: |
          printf "1\n1\n1\n1\n2\n3\n" | java -jar BloomShop.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloomShop
          path: BloomShop.jar
          retention-days: 30
